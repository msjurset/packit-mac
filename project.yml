name: PackIt
options:
  bundleIdPrefix: com.msjurset
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0

targets:
  PackIt:
    type: application
    platform: macOS
    sources:
      - Sources/PackIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.msjurset.packit-mac
        PRODUCT_NAME: PackIt
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.travel"
        INFOPLIST_KEY_CFBundleDisplayName: PackIt
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - package: Sparkle

  PackItUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PackIt
